<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>O B S E S S I O N</title>
    <style>
      :root {
        --bg-color: #030303;
        --text-main: #e0e0e0;
        --text-dark: #555555;
        --blood-red: #8a0303;
        --blood-red-glow: rgba(138, 3, 3, 0.6);
        --font-main: "Cormorant Garamond", serif;
      }

      @import url("https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&display=swap");

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        user-select: none;
      }

      body {
        background-color: var(--bg-color);
        color: var(--text-main);
        font-family: var(--font-main);
        height: 100vh;
        width: 100vw;
        overflow: hidden;
        position: relative;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .vignette {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: radial-gradient(circle, transparent 40%, #000000 120%);
        pointer-events: none;
        z-index: 5;
      }

      .crt-scanlines {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: linear-gradient(to bottom, rgba(255, 255, 255, 0), rgba(255, 255, 255, 0) 50%, rgba(0, 0, 0, 0.1) 50%, rgba(0, 0, 0, 0.1));
        background-size: 100% 4px;
        pointer-events: none;
        z-index: 6;
        opacity: 0.4;
      }

      #film-canvas {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: 1;
        opacity: 0.3;
      }

      #flash-overlay {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: #ff0000;
        mix-blend-mode: overlay;
        opacity: 0;
        pointer-events: none;
        z-index: 100;
      }

      .screen {
        position: absolute;
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        opacity: 0;
        pointer-events: none;
        transition: opacity 2s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        z-index: 10;
      }

      .screen.active {
        opacity: 1;
        pointer-events: all;
      }

      .intro-text {
        color: var(--text-dark);
        font-size: 1.5rem;
        letter-spacing: 6px;
        text-transform: uppercase;
        cursor: pointer;
        animation: pulse-slow 3s infinite alternate;
        text-align: center;
        padding: 0 20px;
      }

      .form-container {
        width: 100%;
        max-width: 800px;
        text-align: center;
        padding: 40px;
        position: relative;
      }

      .main-title {
        font-size: 3.5rem;
        font-weight: 600;
        margin-bottom: 50px;
        letter-spacing: 3px;
        color: var(--text-main);
        text-shadow:
          2px 0 0 rgba(255, 0, 0, 0.3),
          -2px 0 0 rgba(0, 0, 255, 0.3);
        min-height: 4rem;
      }

      .input-wrapper {
        margin-bottom: 40px;
        position: relative;
        width: 100%;
        height: 120px;
        display: flex;
        justify-content: center;
      }

      .input-backdrop {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        font-family: var(--font-main);
        font-size: 2rem;
        text-align: center;
        padding: 15px;
        color: #ffffff;
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        pointer-events: none;
        white-space: pre-wrap;
        word-wrap: break-word;
        line-height: 1.4;
        z-index: 1;
        transition: border-color 0.4s ease;
        opacity: 0;
        transform: translateY(20px);
        overflow-y: auto;
        -ms-overflow-style: none;
        scrollbar-width: none;
      }
      .input-backdrop::-webkit-scrollbar {
        display: none;
      }

      .wish-input {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: transparent;
        border: none;
        color: transparent;
        caret-color: #ffffff;
        font-family: var(--font-main);
        font-size: 2rem;
        text-align: center;
        padding: 15px;
        outline: none;
        z-index: 2;
        opacity: 0;
        transform: translateY(20px);
        resize: none;
        line-height: 1.4;
        overflow-y: auto;
        -ms-overflow-style: none;
        scrollbar-width: none;
      }
      .wish-input::-webkit-scrollbar {
        display: none;
      }

      .wish-input::placeholder {
        color: #333;
        font-style: italic;
      }

      .wish-input.visible,
      .input-backdrop.visible {
        opacity: 1;
        transform: translateY(0);
        transition:
          opacity 1s ease,
          transform 1s ease;
      }

      .wish-input:focus + .input-backdrop {
        border-bottom: 1px solid var(--blood-red);
        background: radial-gradient(circle, rgba(138, 3, 3, 0.05) 0%, transparent 80%);
      }

      .word-trigger {
        color: var(--blood-red);
        font-weight: 700;
        text-shadow:
          0 0 15px var(--blood-red-glow),
          0 0 5px #ff0000;
        animation: pulse-word 1.5s infinite alternate;
      }

      .warning-block {
        margin-bottom: 50px;
        min-height: 60px;
      }

      .phrase-careful {
        font-size: 1.6rem;
        color: #999;
        margin-bottom: 15px;
        letter-spacing: 2px;
        min-height: 2rem;
      }
      .phrase-toll {
        font-size: 1.4rem;
        color: var(--blood-red);
        font-weight: 700;
        letter-spacing: 4px;
        text-transform: uppercase;
        text-shadow: 0 0 10px var(--blood-red-glow);
        opacity: 0;
      }

      .action-btn {
        background: transparent;
        border: 1px solid var(--text-dark);
        color: #fff;
        padding: 18px 60px;
        font-size: 1.3rem;
        letter-spacing: 5px;
        text-transform: uppercase;
        font-family: var(--font-main);
        cursor: pointer;
        transition: all 0.4s ease;
        opacity: 0;
        pointer-events: none;
      }

      .action-btn.visible {
        opacity: 1;
        pointer-events: all;
      }
      .action-btn:hover {
        border-color: var(--blood-red);
        color: var(--blood-red);
        box-shadow:
          inset 0 0 15px rgba(138, 3, 3, 0.2),
          0 0 20px rgba(138, 3, 3, 0.4);
        letter-spacing: 7px;
      }

      #screen-result {
        background-color: #000;
        z-index: 20;
        padding: 40px;
        text-align: center;
      }

      .echo-wish-container {
        margin-bottom: 50px;
        opacity: 0;
        transform: scale(0.95);
        transition: all 3s ease;
      }

      .echo-wish-container.show {
        opacity: 1;
        transform: scale(1);
      }

      .echo-label {
        font-size: 1.2rem;
        color: #555;
        letter-spacing: 4px;
        text-transform: uppercase;
        margin-bottom: 10px;
      }

      .user-echo-text {
        font-size: 2.5rem;
        color: #fff;
        font-style: italic;
        letter-spacing: 1px;
        text-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
      }

      .creepy-words-container {
        display: flex;
        flex-direction: column;
        gap: 20px;
      }

      .creepy-line {
        font-size: 1.8rem;
        color: var(--blood-red);
        font-weight: 700;
        letter-spacing: 5px;
        text-transform: uppercase;
        opacity: 0;
        text-shadow: 0 0 20px var(--blood-red-glow);
        transition: opacity 2s ease;
      }

      @keyframes pulse-slow {
        0% {
          opacity: 0.3;
          transform: scale(0.98);
        }
        100% {
          opacity: 1;
          transform: scale(1);
        }
      }
      @keyframes pulse-word {
        0% {
          opacity: 0.8;
        }
        100% {
          opacity: 1;
          text-shadow: 0 0 20px #ff0000;
        }
      }
      .shake-hard {
        animation: shake-extreme 0.3s cubic-bezier(0.36, 0.07, 0.19, 0.97) both;
      }
      @keyframes shake-extreme {
        0% {
          transform: translate(0, 0) rotate(0deg);
        }
        20% {
          transform: translate(-10px, 10px) rotate(-2deg);
        }
        40% {
          transform: translate(15px, -5px) rotate(2deg);
        }
        60% {
          transform: translate(-5px, -15px) rotate(-3deg);
        }
        80% {
          transform: translate(10px, 5px) rotate(1deg);
        }
        100% {
          transform: translate(0, 0) rotate(0deg);
        }
      }
      .glitch-text {
        animation: text-flicker 0.1s infinite alternate;
      }
      @keyframes text-flicker {
        0% {
          opacity: 0.8;
        }
        100% {
          opacity: 1;
          text-shadow:
            2px 0 red,
            -2px 0 blue;
        }
      }

      @media (max-width: 768px) {
        .form-container {
          padding: 20px;
        }
        .intro-text {
          font-size: 1.2rem;
          letter-spacing: 4px;
        }
        .main-title {
          font-size: 2.2rem;
          margin-bottom: 30px;
          min-height: 3rem;
        }
        .input-wrapper {
          height: 100px;
          margin-bottom: 30px;
        }
        .wish-input,
        .input-backdrop {
          font-size: 1.5rem;
          padding: 10px;
        }
        .warning-block {
          margin-bottom: 40px;
        }
        .phrase-careful {
          font-size: 1.2rem;
          margin-bottom: 10px;
        }
        .phrase-toll {
          font-size: 1.1rem;
          letter-spacing: 2px;
        }
        .action-btn {
          padding: 15px 30px;
          font-size: 1.1rem;
          letter-spacing: 3px;
        }
        .user-echo-text {
          font-size: 1.8rem;
        }
        .creepy-line {
          font-size: 1.3rem;
          letter-spacing: 3px;
        }
      }

      @media (max-width: 480px) {
        .main-title {
          font-size: 1.8rem;
          letter-spacing: 2px;
        }
        .wish-input,
        .input-backdrop {
          font-size: 1.2rem;
        }
        .action-btn {
          padding: 12px 25px;
          font-size: 1rem;
        }
        .user-echo-text {
          font-size: 1.5rem;
        }
        .creepy-line {
          font-size: 1.1rem;
        }
      }
    </style>
  </head>
  <body>
    <audio id="bg-audio" src="bgsong.mp3" loop preload="auto"></audio>
    <audio id="scream-audio" src="obsession_sound.mp3" preload="auto"></audio>

    <div class="crt-scanlines"></div>
    <div class="vignette"></div>
    <canvas id="film-canvas"></canvas>
    <div id="flash-overlay"></div>

    <div id="screen-intro" class="screen active" onclick="GameController.start()">
      <p class="intro-text">Surrender to your desire</p>
    </div>

    <div id="screen-main" class="screen">
      <div class="form-container">
        <h1 class="main-title" id="type-title"></h1>

        <div class="input-wrapper">
          <textarea id="wish-input" class="wish-input" placeholder="I wish..." autocomplete="off"></textarea>
          <div id="input-backdrop" class="input-backdrop"></div>
        </div>

        <div class="warning-block">
          <p class="phrase-careful" id="type-careful"></p>
          <p class="phrase-toll" id="type-toll">The toll must be paid.</p>
        </div>

        <button class="action-btn" id="action-btn" onclick="GameController.executeRitual()">Make a wish</button>
      </div>
    </div>

    <div id="screen-result" class="screen">
      <div class="echo-wish-container" id="echo-container">
        <p class="echo-label">You wished for:</p>
        <p class="user-echo-text" id="user-echo">""</p>
      </div>
      <div class="creepy-words-container" id="creepy-words"></div>
    </div>

    <script>
      class FilmCanvas {
        constructor() {
          this.canvas = document.getElementById("film-canvas");
          this.ctx = this.canvas.getContext("2d");
          this.particles = [];
          this.scratches = [];
          this.resize();
          window.addEventListener("resize", () => this.resize());
          this.initParticles();
          this.animate();
        }
        resize() {
          this.width = window.innerWidth;
          this.height = window.innerHeight;
          this.canvas.width = this.width;
          this.canvas.height = this.height;
        }
        initParticles() {
          for (let i = 0; i < 60; i++) {
            this.particles.push({
              x: Math.random() * this.width,
              y: Math.random() * this.height,
              size: Math.random() * 2 + 0.5,
              speedY: Math.random() * 0.5 + 0.1,
              speedX: (Math.random() - 0.5) * 0.5,
              opacity: Math.random() * 0.5,
            });
          }
        }
        animate() {
          this.ctx.clearRect(0, 0, this.width, this.height);
          if (Math.random() < 0.05) this.scratches.push({ x: Math.random() * this.width, length: Math.random() * this.height, opacity: Math.random() * 0.3, life: Math.random() * 5 + 2 });
          for (let i = this.scratches.length - 1; i >= 0; i--) {
            let s = this.scratches[i];
            this.ctx.fillStyle = `rgba(255, 255, 255, ${s.opacity})`;
            this.ctx.fillRect(s.x, 0, 1, s.length);
            s.life--;
            if (s.life <= 0) this.scratches.splice(i, 1);
          }
          this.particles.forEach((p) => {
            this.ctx.fillStyle = `rgba(200, 200, 200, ${p.opacity})`;
            this.ctx.beginPath();
            this.ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
            this.ctx.fill();
            p.y += p.speedY;
            p.x += p.speedX;
            if (p.y > this.height) p.y = 0;
            if (p.x > this.width) p.x = 0;
            if (p.x < 0) p.x = this.width;
            p.opacity += (Math.random() - 0.5) * 0.1;
            if (p.opacity > 0.6) p.opacity = 0.6;
            if (p.opacity < 0.1) p.opacity = 0.1;
          });
          requestAnimationFrame(() => this.animate());
        }
      }

      const AudioEngine = {
        bgAudio: document.getElementById("bg-audio"),
        screamAudio: document.getElementById("scream-audio"),
        playBG() {
          this.bgAudio.volume = 0;
          this.bgAudio.play().catch((e) => console.log("BG missing"));
          let vol = 0;
          let fade = setInterval(() => {
            if (vol < 0.5) {
              vol += 0.02;
              this.bgAudio.volume = vol;
            } else clearInterval(fade);
          }, 100);
        },
        fadeOutBG(durationMs, callback) {
          const steps = 20;
          let currentVol = this.bgAudio.volume;
          const volDecrease = currentVol / steps;
          let fadeInterval = setInterval(() => {
            if (currentVol > volDecrease) {
              currentVol -= volDecrease;
              this.bgAudio.volume = currentVol;
            } else {
              this.bgAudio.volume = 0;
              this.bgAudio.pause();
              clearInterval(fadeInterval);
              if (callback) callback();
            }
          }, durationMs / steps);
        },
        playScream() {
          this.screamAudio.volume = 1.0;
          this.screamAudio.play().catch((e) => console.log("Scream missing"));
        },
      };

      async function typeWriter(elementId, text, speedMultiplier = 1) {
        const el = document.getElementById(elementId);
        el.innerHTML = "";
        for (let i = 0; i < text.length; i++) {
          el.innerHTML += text.charAt(i);
          await new Promise((r) => setTimeout(r, (Math.random() * 70 + 30) * speedMultiplier));
        }
      }

      const GameController = {
        DOM: {
          intro: document.getElementById("screen-intro"),
          main: document.getElementById("screen-main"),
          result: document.getElementById("screen-result"),
          input: document.getElementById("wish-input"),
          backdrop: document.getElementById("input-backdrop"),
          btn: document.getElementById("action-btn"),
          tollPhrase: document.getElementById("type-toll"),
          flash: document.getElementById("flash-overlay"),
        },
        triggerWords: /\b(love|obsessed|obsession|desire|need|him|her|mine|forever|die|blood|loved)\b/gi,

        async start() {
          AudioEngine.playBG();
          this.DOM.intro.classList.remove("active");

          this.DOM.input.addEventListener("input", () => {
            let text = this.DOM.input.value;

            if (text.length > 0) {
              this.DOM.input.style.color = "transparent";
            } else {
              this.DOM.input.style.color = "";
            }

            let formattedText = text.replace(/\n/g, "<br>");

            let highlighted = formattedText.replace(this.triggerWords, '<span class="word-trigger">$&</span>');
            this.DOM.backdrop.innerHTML = highlighted;
          });

          this.DOM.input.addEventListener("scroll", () => {
            this.DOM.backdrop.scrollTop = this.DOM.input.scrollTop;
          });

          setTimeout(() => {
            this.DOM.main.classList.add("active");
            this.runTypingSequence();
          }, 1500);
        },

        async runTypingSequence() {
          await new Promise((r) => setTimeout(r, 1000));
          await typeWriter("type-title", "What do you wish for?");
          await new Promise((r) => setTimeout(r, 500));
          this.DOM.input.classList.add("visible");
          this.DOM.backdrop.classList.add("visible");
          this.DOM.input.focus();
          await new Promise((r) => setTimeout(r, 1000));
          await typeWriter("type-careful", "Be careful what you wish for.");
          await new Promise((r) => setTimeout(r, 800));
          this.DOM.tollPhrase.style.opacity = "1";
          this.DOM.tollPhrase.classList.add("glitch-text");
          setTimeout(() => {
            this.DOM.tollPhrase.classList.remove("glitch-text");
            this.DOM.btn.classList.add("visible");
          }, 1500);
        },

        executeRitual() {
          const userText = this.DOM.input.value.trim();
          if (userText === "") {
            this.DOM.backdrop.style.borderBottomColor = "var(--blood-red)";
            return;
          }

          this.DOM.input.disabled = true;
          this.DOM.btn.style.pointerEvents = "none";

          AudioEngine.fadeOutBG(2500, () => {
            setTimeout(() => {
              this.triggerFinalPhase(userText);
            }, 1000);
          });

          document.getElementById("type-title").classList.add("glitch-text");
          this.DOM.tollPhrase.classList.add("glitch-text");

          setTimeout(() => {
            this.DOM.main.style.transition = "opacity 3s ease";
            this.DOM.main.classList.remove("active");
          }, 1500);
        },

        triggerFinalPhase(userText) {
          AudioEngine.playScream();
          this.DOM.flash.style.opacity = "0.8";
          document.body.classList.add("shake-hard");
          setTimeout(() => {
            this.DOM.flash.style.opacity = "0";
            document.body.classList.remove("shake-hard");
          }, 150);

          document.getElementById("user-echo").innerText = `"${userText}"`;

          const creepyPhrases = ["IT HAS BEGUN.", "THERE IS NO TURNING BACK.", "LOVE IS A PARASITE.", "IT WILL CONSUME YOU."];

          setTimeout(() => {
            this.DOM.result.classList.add("active");

            setTimeout(() => {
              document.getElementById("echo-container").classList.add("show");
            }, 1000);

            const wordsContainer = document.getElementById("creepy-words");
            creepyPhrases.forEach((phrase, index) => {
              setTimeout(
                () => {
                  let p = document.createElement("p");
                  p.className = "creepy-line";
                  p.innerText = phrase;
                  wordsContainer.appendChild(p);

                  setTimeout(() => (p.style.opacity = "1"), 50);
                },
                4000 + index * 2000,
              );
            });
          }, 3500);
        },
      };

      window.onload = () => new FilmCanvas();

      document.getElementById("wish-input").addEventListener("keydown", function (e) {
        if (e.key === "Enter" && !e.shiftKey) {
          e.preventDefault();
          GameController.executeRitual();
        }
      });
    </script>
  </body>
</html>
